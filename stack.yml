services:
  unifi-dns-traefik:
    image: ${IMAGE:?set IMAGE}
    environment:
      DOCKER_HOST: ${DOCKER_HOST:-http://docker-socket-proxy:2375}
      UNIFI_URL: ${UNIFI_URL:?set UNIFI_URL}
      ALLOWED_ZONES: ${ALLOWED_ZONES:?set ALLOWED_ZONES}
      DEFAULT_TARGET: ${DEFAULT_TARGET:-docker-swarm}
      CNAME_LOCALDOMAIN: ${CNAME_LOCALDOMAIN:-local}
      RECONCILE_INTERVAL_SECONDS: ${RECONCILE_INTERVAL_SECONDS:-300}
    secrets:
      - source: unifi_dns_traefik_api_key
        target: unifi_api_key
    volumes:
      - unifi_dns_traefik_state:/state
    ports:
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics

volumes:
  unifi_dns_traefik_state:

secrets:
  unifi_dns_traefik_api_key:
    external: true
