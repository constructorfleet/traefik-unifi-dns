name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Python compile check
        run: python -m py_compile app/*.py

      - name: Compose config
        run: docker compose -f docker-compose.yml config --no-interpolate

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="v$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.release.outputs.image }}:latest
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.tag }}
            ${{ steps.release.outputs.image }}:sha-${{ github.sha }}

      - name: Create git tag
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.release.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.release.outputs.tag }} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"
